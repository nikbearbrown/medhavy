<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-1 desc-0-1">
<title id="title-0-1">data production architecture</title>
<desc id="desc-0-1">The data production architecture. Two columns side by side: "Interaction Design" and "Evidence Generated." Hint-before-answer → scaffolding response curve. Spaced retrieval → retrieval strength decay signature. Confidence before correctness → uncertainty calibration. Temporal session logs → engagement pattern. Sequential error logging → trajectory coherence. Cross-context application prompts → transfer evidence. Social knowledge texture logs → genuine encounter evidence. Caption: Every Medhavy interaction is designed to produce learning and evidence simultaneously. Neither is a byproduct of the other.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">data production architecture</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">The data production architecture. Two columns side by side:</tspan><tspan x="48" dy="15">"Interaction Design" and "Evidence Generated." Hint-before-answer</tspan><tspan x="48" dy="15">→ scaffolding response curve. Spaced retrieval → retrieval</tspan><tspan x="48" dy="15">strength decay signature. Confidence before correctness →</tspan></text>
