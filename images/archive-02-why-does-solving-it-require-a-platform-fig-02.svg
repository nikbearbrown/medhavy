<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-2 desc-0-2">
<title id="title-0-2">Three constraints → one conclusion</title>
<desc id="desc-0-2">Three constraints → one conclusion. Three boxes labeled "Live instrumentation required," "Authentic context evidence is richest," and "Measurement requires specific interaction design" — all three arrows pointing to a single box labeled "The measurement infrastructure and the learning infrastructure are the same system." Caption: The platform requirement isn't a design preference. It follows from three independent constraints that all lead to the same place.</desc>
