<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-2 desc-0-2">
<title id="title-0-2">measurement hierarchy</title>
<desc id="desc-0-2">The measurement hierarchy — behavioral events (PostHog) → GLP components → reward signal → bandit update → mode selection. Caption: What gets measured shapes what gets optimized. The GLP framework exists to ensure the reward signal tracks genuine learning rather than engagement proxies.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">measurement hierarchy</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">The measurement hierarchy — behavioral events (PostHog) → GLP</tspan><tspan x="48" dy="15">components → reward signal → bandit update → mode selection.</tspan><tspan x="48" dy="15">Caption: What gets measured shapes what gets optimized. The GLP</tspan><tspan x="48" dy="15">framework exists to ensure the reward signal tracks genuine</tspan></text>
